services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: energy
    volumes:
      - ts_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: ${MEM_LIMIT:-20G}
          cpus: '4'
    shm_size: 2g
    command: >
      postgres
        -c shared_buffers=6144MB
        -c work_mem=128MB
        -c maintenance_work_mem=1GB
        -c effective_cache_size=18GB
        -c max_parallel_workers_per_gather=2
        -c jit=off
    networks:
      - benchnet

volumes:
  ts_data:

networks:
  benchnet:
    external: true
